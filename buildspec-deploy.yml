version: 0.2

# CodeBuild buildspec for Terraform deployment
# This phase runs terraform init, plan, and apply

phases:
  install:
    commands:
      - echo "Installing Terraform..."
      - |
        wget -q https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip
        unzip -q terraform_1.7.0_linux_amd64.zip
        mv terraform /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - echo "Initializing Terraform with S3 backend..."
      - |
        terraform init \
          -backend-config="bucket=${TF_STATE_BUCKET}" \
          -backend-config="key=${TF_STATE_KEY}" \
          -backend-config="region=${AWS_REGION}" \
          -no-color \
          -input=false

  build:
    commands:
      - echo "Running Terraform plan..."
      - terraform plan -out=tfplan -no-color -input=false

      - echo ""
      - echo "Applying Terraform changes..."
      - terraform apply -auto-approve -no-color -input=false tfplan

  post_build:
    commands:
      - echo "Terraform deployment completed on $(date)"
      - terraform output -no-color

artifacts:
  files:
    - '**/*'
  name: DeployOutput

cache:
  paths:
    - '/root/.terraform.d/plugin-cache/**/*'
